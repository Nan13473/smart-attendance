<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – SmartPortal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.07);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 24px;
        }

        /* Tab Toggle */
        .tab-switcher {
            display: flex;
            background: #f0f2f5;
            border-radius: 30px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            color: #666;
            cursor: pointer;
            z-index: 1;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s ease;
            user-select: none;
        }

        .tab-btn.active {
            color: #fff;
        }

        .tab-indicator {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            background-color: #1a1a1a;
            border-radius: 30px;
            transition: transform 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            color: #1a1a1a;
            background-color: #f9fafb;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        input:focus {
            border-color: #0066ff;
            background-color: #ffffff;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background-color: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #333;
        }

        .flash {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .flash.success {
            background: #dcfce7;
            color: #16a34a;
        }

        .flash.error {
            background: #fee2e2;
            color: #dc2626;
        }

        .login-link {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-top: 24px;
        }

        .login-link a {
            color: #0066ff;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Hide teacher-only field by default */
        .student-only,
        .teacher-only {
            display: block;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">SmartPortal</div>
        <p class="subtitle" id="subtitle">Create your account</p>

        {% if message %}
        <div class="flash">{{ message }}</div>
        {% endif %}

        <!-- Tab Toggle -->
        <div class="tab-switcher">
            <div class="tab-indicator" id="tab-indicator"></div>
            <div class="tab-btn active" id="tab-user" onclick="switchTab('user')">Student</div>
            <div class="tab-btn" id="tab-professor" onclick="switchTab('professor')">Teacher</div>
        </div>

        <form action="/signup" method="POST">
            <!-- Hidden field tells Flask which signup to process -->
            <input type="hidden" name="role" id="role" value="{{ active_tab or 'user' }}">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <!-- Student-only field -->
            <div class="form-group" id="studentid-group">
                <label for="id">Student ID</label>
                <input type="text" id="id" name="id" placeholder="Enter your Student ID">
            </div>

            <!-- Teacher-only field -->
            <div class="form-group" id="teacherid-group" style="display: none;">
                <label for="teacherid">Teacher ID</label>
                <input type="text" id="teacherid" name="id" placeholder="Enter your Teacher ID">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="pass" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Create Student Account</button>
        </form>

        <p class="login-link">Already have an account? <a href="/">Log in</a></p>
    </div>

    <script>
        const activeTab = "{{ active_tab or 'user' }}";

        function switchTab(tab) {
            const indicator = document.getElementById('tab-indicator');
            const userTab = document.getElementById('tab-user');
            const professorTab = document.getElementById('tab-professor');
            const studentIdGroup = document.getElementById('studentid-group');
            const teacherIdGroup = document.getElementById('teacherid-group');
            // Get actual inputs
            const studentIdInput = document.getElementById('id');
            const teacherIdInput = document.getElementById('teacherid');

            const submitBtn = document.getElementById('submit-btn');
            const subtitle = document.getElementById('subtitle');
            const roleInput = document.getElementById('role');

            if (tab === 'user') {
                indicator.style.transform = 'translateX(0%)';
                userTab.classList.add('active');
                professorTab.classList.remove('active');

                // toggle visibility and disable state
                studentIdGroup.style.display = 'block';
                studentIdInput.disabled = false;

                teacherIdGroup.style.display = 'none';
                teacherIdInput.disabled = true;

                submitBtn.textContent = 'Create Student Account';
                subtitle.textContent = 'Create your student account';
                roleInput.value = 'user';
            } else {
                indicator.style.transform = 'translateX(100%)';
                professorTab.classList.add('active');
                userTab.classList.remove('active');

                // toggle visibility and disable state
                studentIdGroup.style.display = 'none';
                studentIdInput.disabled = true;

                teacherIdGroup.style.display = 'block';
                teacherIdInput.disabled = false;

                submitBtn.textContent = 'Create Teacher Account';
                subtitle.textContent = 'Create your teacher account';
                roleInput.value = 'professor';
            }
        }

        // Restore active tab from Flask (e.g. after error on professor form)
        if (activeTab === 'professor') {
            switchTab('professor');
        }
    </script>
</body>

</html>
